name: release

# Build the portable Stockroom.exe on Windows (M9f). PyInstaller does not cross-compile and
# pywebview/WebView2 are Windows-only, so the release binary is produced here, on windows-latest,
# never on the Linux dev box. On a version tag it is attached to the GitHub Release; on a manual
# dispatch it is uploaded as a downloadable build artifact.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create / upload release assets

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync (provision the importable stockroom package the launcher freezes)
        run: uv sync

      - name: Build the launcher exe
        run: uv run --with pyinstaller pyinstaller packaging/stockroom.spec --noconfirm --clean

      - name: Verify the exe was produced
        shell: pwsh
        run: if (-not (Test-Path dist/Stockroom.exe)) { throw "Stockroom.exe was not built" }

      - name: Upload as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stockroom-exe
          path: dist/Stockroom.exe

      - name: Publish the GitHub Release (on a version tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Stockroom.exe
          name: Stockroom ${{ github.ref_name }}
          prerelease: true
          body: |
            Portable frozen-once launcher for Stockroom, the KiCad component-library and PCB-project manager.

            Download `Stockroom.exe` below and run it. On first launch it clones the app repo to
            `%LOCALAPPDATA%\Stockroom\app`, provisions the environment with uv, opens the WebView2
            window, and shows the onboarding screen (open, clone, or create your library). Updates are a
            git pull from the in-app Update control; the exe itself never re-downloads.

            Requirements on the target machine: git and uv (https://astral.sh/uv) on PATH, the WebView2
            runtime (bundled with current Windows), internet on first run, and 64-bit Windows. KiCad 10
            for the ERC/DRC and preview features.

            Marked pre-release: the exe is built and its launcher chain is tested on Linux, but the actual
            Windows launch (the WebView2 window, first-run onboarding, and a self-update cycle) has not
            yet been verified on a real Windows machine. Promote to a full release once that passes.
