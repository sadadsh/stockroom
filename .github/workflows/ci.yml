name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync
      - name: Provision render browsers (Playwright Chromium + Camoufox)
        # The scrape engine renders through Playwright Chromium (BrowserFetcher) and the
        # genuine-fingerprint Camoufox Firefox (CamoufoxFetcher, which defeats Akamai +
        # DataDome). Both browser binaries are downloaded here, mirroring what the packaged
        # app must provision at build/first-run, so the requires_browser tests can launch
        # and the portable render path is validated on every OS.
        run: |
          uv run python -m playwright install --with-deps chromium
          uv run python -m camoufox fetch
      - name: Zero-Qt / zero-pywebview import gate
        if: runner.os == 'Linux'
        run: |
          set -e
          # the backend engine imports zero PyQt (it is a headless Qt-free engine)
          if grep -REn 'import[[:space:]]+PyQt5|from[[:space:]]+PyQt5|QtCore|QtWidgets|QtGui' \
              app/backend/stockroom/ ; then
            echo "stockroom backend must not import PyQt (it is a Qt-free engine)"; exit 1
          fi
          # stockroom/api/ imports zero pywebview (host-only dependency, keeps the API headless-testable).
          # Match IMPORTS only (import webview / from webview / import pywebview / from pywebview) so a
          # mention of the word in a comment or docstring is not a false positive that breaks the gate.
          if grep -REn '^[[:space:]]*(import|from)[[:space:]]+(py)?webview\b' \
              app/backend/stockroom/api/ ; then
            echo "stockroom/api must not import pywebview (host-only dependency)"; exit 1
          fi
      - name: Run backend suite
        run: uv run pytest tests/backend -v
