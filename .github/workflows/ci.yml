name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync
      - name: Run backend suite
        run: uv run pytest tests/backend -v
