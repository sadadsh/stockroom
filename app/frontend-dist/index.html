<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stockroom</title>
    <script>
      // Set the theme attribute synchronously, before first paint, so a
      // persisted-light user never sees a dark flash while React boots. The
      // ThemeProvider reads the same key and keeps it in sync thereafter.
      (function () {
        try {
          var t = localStorage.getItem("sr-theme");
          document.documentElement.dataset.theme =
            t === "light" || t === "dark" ? t : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
