:root{
  --rail:rgba(255,255,255,.022);--bg:rgba(23,23,24,.5);--raise:rgba(255,255,255,.055);--raise2:rgba(255,255,255,.1);--field:rgba(0,0,0,.2);
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --t1:#f4f4f4;--t2:rgba(244,244,244,.66);--t3:rgba(244,244,244,.4);
  --ok:#6cc08a;--warn:#e0b354;--err:#e8756c;
  --acc:#f3f3f3;--acc-on:#161616;
  --sans:"DM Sans","Segoe UI",system-ui,sans-serif;--mono:var(--sans);
  --r:10px;--rc:7px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#090909}
.scroll{width:100%;height:100vh;overflow:auto;display:flex;flex-direction:column;
        background:radial-gradient(1100px 560px at 12% -6%,rgba(255,255,255,.05),transparent 58%),radial-gradient(1000px 680px at 108% 8%,rgba(255,255,255,.032),transparent 56%),#0b0b0b}
.app{display:flex;min-width:1160px;flex:1;min-height:640px;background:var(--bg);color:var(--t1);backdrop-filter:blur(34px);-webkit-backdrop-filter:blur(34px);
     font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-variant-numeric:tabular-nums}
@media(prefers-reduced-motion:reduce){*{transition:none !important}}
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.14) transparent}
*::-webkit-scrollbar{width:11px;height:11px}
*::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-track{background:transparent}

.btn{position:relative;height:31px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border-radius:var(--rc);font:inherit;font-size:12.5px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid var(--line);background:var(--raise);color:var(--t2);transition:background .12s,color .12s}
.btn:hover{background:var(--raise2);color:var(--t1)}
.btn.primary{background:var(--acc);color:var(--acc-on);font-weight:600;border-color:var(--acc)}
.btn.primary:hover{background:#fff}
.btn.sm{height:27px;font-size:12px;padding:0 10px}
.btn.icon{width:31px;padding:0;justify-content:center;font-size:15px}
.dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}
.d-ok{background:var(--ok)}.d-warn{background:var(--warn)}.d-err{background:var(--err)}.d-off{background:var(--t3)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px}
.pill.ok{color:var(--ok);background:rgba(108,192,138,.14)}.pill.warn{color:var(--warn);background:rgba(224,179,84,.13)}.pill.err{color:var(--err);background:rgba(232,117,108,.13)}.pill.off{color:var(--t3);background:var(--raise)}

.rail{width:118px;flex:none;background:var(--rail);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 11px}
.rail .brand{color:var(--t1);font-size:12px;font-weight:700;margin:2px 6px 20px}
.rail .n{display:flex;align-items:center;gap:11px;color:var(--t3);font-size:12.5px;padding:8px 10px;border-radius:var(--rc);margin-bottom:1px;cursor:pointer}
.rail .n:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.rail .n.sel{color:var(--t1);background:var(--raise2)}
.rail .n .g{width:16px;text-align:center;font-size:14px;opacity:.85}
.rail .foot{margin-top:auto;padding-top:12px}

.area{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;padding:0 18px;height:56px;flex:none}
.tbh{font-size:15px;font-weight:600}
.body{flex:1;display:flex;min-height:0}
.picker{width:250px;flex:none;display:flex;flex-direction:column;min-height:0;padding:8px 6px 0 14px}
.pk-head{padding:6px 8px 10px;flex:none}
.srch{display:flex;align-items:center;gap:9px;background:var(--field);border:1px solid var(--line);border-radius:var(--rc);padding:9px 11px}
.srch svg{flex:none;opacity:.45}.srch input{border:none;background:transparent;color:var(--t1);font:inherit;font-size:12.5px;width:100%;outline:none}
.srch input::placeholder{color:var(--t3)}
.pk-list{flex:1;overflow-y:auto;padding:2px 8px 12px;min-height:0}
.prow{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:var(--rc);cursor:pointer;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow:hover:not(.sel){background:rgba(255,255,255,.03)}.prow.sel{background:var(--raise2)}
.prow .st{width:8px;height:8px;border-radius:50%;flex:none}
.prow .txt{flex:1;min-width:0}
.prow .nm{font-size:12.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow .sub{font-size:10.5px;margin-top:1px}
.prow .sub.err{color:var(--err)}.prow .sub.warn{color:var(--warn)}.prow .sub.ok{color:var(--ok)}

.cv{flex:1;min-width:0;overflow-y:auto;padding:20px 30px 44px;border-left:1px solid var(--line)}
.cvinner{max-width:820px}
.phead{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.phead .hgrow{flex:1;min-width:0}
.pname{font-size:21px;font-weight:600}
.ppath{font-size:12px;color:var(--t3);margin-top:3px}
.seg{display:inline-flex;background:var(--field);border:1px solid var(--line);border-radius:var(--rc);padding:3px}
.seg .s{font-size:12.5px;font-weight:500;color:var(--t3);padding:6px 14px;border-radius:5px;cursor:pointer}
.seg .s.on{color:var(--t1);background:var(--raise2)}

/* audit verdict */
.verdict{display:flex;align-items:center;gap:14px;border-radius:14px;padding:18px 20px;border:1px solid var(--line);background:var(--raise);margin-bottom:8px}
.verdict .vdot{width:11px;height:11px;border-radius:50%;flex:none}
.verdict.ok .vdot{background:var(--ok)}.verdict.err .vdot{background:var(--err)}.verdict.warn .vdot{background:var(--warn)}
.verdict .vt{flex:1}
.verdict .vs{font-size:19px;font-weight:700}
.verdict .vd{font-size:12px;color:var(--t3);margin-top:2px}

.sec{font-size:11px;font-weight:600;color:var(--t3);margin:24px 0 12px;display:flex;align-items:center;gap:9px}
.sec .ct{color:var(--t2)}

.agroup{background:var(--raise);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px}
.agroup+.agroup{margin-top:11px}
.agroup .ah{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.agroup .ah .at{font-size:13px;font-weight:600}
.agroup .ah .pill{margin-left:auto}
.arow{display:flex;align-items:center;gap:11px;padding:8px 0;font-size:12.5px}
.arow .adot{width:7px;height:7px;border-radius:50%;flex:none}
.arow .an{color:var(--t2)}
.arow .av{margin-left:auto;font-weight:600}
.arow .av.err{color:var(--err)}.arow .av.warn{color:var(--warn)}.arow .av.off{color:var(--t3)}
.arow .afix{margin-left:12px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:0 40px}

/* settings page */
.sblock{background:var(--raise);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.sblock+.sblock{margin-top:11px}
.sblock .sbt{font-size:13px;font-weight:600;margin-bottom:4px}
.sblock .sbd{font-size:11.5px;color:var(--t3);margin-bottom:15px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 18px}
.f{display:flex;flex-direction:column;gap:6px}
.f .fl{font-size:11.5px;color:var(--t2)}
.f .fi{background:var(--field);border:1px solid var(--line2);border-radius:var(--rc);padding:8px 11px;font-size:13px;color:var(--t1);display:flex;align-items:center;justify-content:space-between}
.f .fi .u{color:var(--t3);font-size:11px}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:2px 24px}
.ck{display:flex;align-items:center;gap:11px;padding:9px 2px;cursor:pointer}
.ck .cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent}
.ck .cb.on{background:var(--acc);border-color:var(--acc);color:var(--acc-on)}
.ck .clab{font-size:12.5px;color:var(--t1)}
.ck .csub{font-size:11px;color:var(--t3)}
.note{font-size:11.5px;color:var(--t3);margin-top:12px;line-height:1.5}
</style>

<div class="scroll"><div class="app">
  <div class="rail">
    <div class="brand">NETDECK</div>
    <div class="n"><span class="g">▤</span>Components</div>
    <div class="n sel"><span class="g">▧</span>Projects</div>
    <div class="n"><span class="g">▥</span>Bench</div>
    <div class="n"><span class="g">⎇</span>Git</div>
    <div class="foot"><div class="n"><span class="g">◍</span>Activity</div><div class="n"><span class="g">☾</span>Theme</div><div class="n"><span class="g">⚙</span>Settings</div></div>
  </div>
  <div class="area">
    <div class="topbar"><div class="tbh">Projects</div></div>
    <div class="body">
      <div class="picker">
        <div class="pk-head"><div class="srch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input placeholder="Search projects" oninput="filterP(this.value)"></div></div>
        <div class="pk-list" id="plist"></div>
      </div>
      <div class="cv"><div class="cvinner" id="detail"></div></div>
    </div>
  </div>
</div></div>

<script>
let view='audit';
const PROJECTS=[
 {name:'Master',path:'~/netdeck/master',
  settings:{layers:4,thickness:1.6,finish:'ENIG',copper:'1oz',rules:{'Min track':0.13,'Clearance':0.13,'Min drill':0.25,'Annular ring':0.13,'Edge clearance':0.25},
    req:{partNumber:true,footprint:true,model3d:true,datasheet:false},qty:1,spares:0,enforce:{erc:true,drc:true,committed:false}},
  actual:{erc:{errors:0,warnings:3},drc:{violations:2,unconnected:1,parity:0},rules:{'Min track':0.12,'Clearance':0.15,'Min drill':0.30,'Annular ring':0.13,'Edge clearance':0.30},
    layers:4,outline:true,thickness:1.6,comps:{total:566,partNumber:564,footprint:566,model3d:561,datasheet:540},git:{n:1}}},
 {name:'Power Board R2',path:'~/netdeck/powerboard',
  settings:{layers:4,thickness:1.6,finish:'ENIG',copper:'2oz',rules:{'Min track':0.15,'Clearance':0.15,'Min drill':0.30,'Annular ring':0.13,'Edge clearance':0.30},
    req:{partNumber:true,footprint:true,model3d:true,datasheet:true},qty:5,spares:10,enforce:{erc:true,drc:true,committed:true}},
  actual:{erc:{errors:0,warnings:0},drc:{violations:0,unconnected:0,parity:0},rules:{'Min track':0.20,'Clearance':0.20,'Min drill':0.35,'Annular ring':0.15,'Edge clearance':0.40},
    layers:4,outline:true,thickness:1.6,comps:{total:210,partNumber:210,footprint:210,model3d:210,datasheet:210},git:{n:0}}},
 {name:'Sensor Node',path:'~/netdeck/sensornode',
  settings:{layers:2,thickness:1.6,finish:'HASL',copper:'1oz',rules:{'Min track':0.15,'Clearance':0.15,'Min drill':0.30,'Annular ring':0.15,'Edge clearance':0.30},
    req:{partNumber:true,footprint:true,model3d:false,datasheet:false},qty:1,spares:0,enforce:{erc:true,drc:true,committed:false}},
  actual:{erc:{errors:4,warnings:6},drc:{violations:9,unconnected:3,parity:2},rules:{'Min track':0.10,'Clearance':0.10,'Min drill':0.25,'Annular ring':0.10,'Edge clearance':0.20},
    layers:2,outline:false,thickness:1.6,comps:{total:95,partNumber:88,footprint:93,model3d:83,datasheet:70},git:{n:3}}},
];
let sel=0;
const FIELDS=[['partNumber','Part number'],['footprint','Footprint'],['model3d','3D model'],['datasheet','Datasheet']];

function mismatches(p){
  const s=p.settings, a=p.actual, m=[];
  if(s.enforce.erc&&a.erc.errors>0)m.push({t:`ERC has ${a.erc.errors} error${a.erc.errors>1?'s':''}`,g:'Design integrity',fix:'Open in KiCad'});
  if(s.enforce.drc&&a.drc.violations>0)m.push({t:`DRC has ${a.drc.violations} violation${a.drc.violations>1?'s':''}`,g:'Design integrity',fix:'Open in KiCad'});
  if(a.drc.unconnected>0)m.push({t:`${a.drc.unconnected} net${a.drc.unconnected>1?'s':''} unrouted`,g:'Design integrity',fix:'Open in KiCad'});
  if(a.drc.parity>0)m.push({t:`Layout does not match schematic (${a.drc.parity})`,g:'Design integrity',fix:'Update PCB'});
  const belowRules=Object.keys(s.rules).filter(k=>a.rules[k]<s.rules[k]);
  if(belowRules.length)m.push({t:`${belowRules.length} design rule${belowRules.length>1?'s are':' is'} looser than the target`,g:'Fabrication',fix:'Raise Rules'});
  if(a.layers!==s.layers)m.push({t:`Board has ${a.layers} layers, target is ${s.layers}`,g:'Fabrication',fix:'Open in KiCad'});
  if(!a.outline)m.push({t:'No board outline',g:'Fabrication',fix:'Open in KiCad'});
  FIELDS.forEach(([k,lab])=>{ if(s.req[k]&&a.comps[k]<a.comps.total)m.push({t:`${a.comps.total-a.comps[k]} components missing a ${lab.toLowerCase()}`,g:'Components',fix:'Fix from Library'}); });
  if(s.enforce.committed&&a.git.n>0)m.push({t:`${a.git.n} uncommitted change${a.git.n>1?'s':''}`,g:'Version',fix:'Commit'});
  return m;
}
function pstatus(p){const m=mismatches(p);return m.length===0?'ok':(m.length>3?'err':'warn');}

function renderList(q=''){
  q=q.trim().toLowerCase();let h='';
  PROJECTS.forEach((p,i)=>{ if(q&&!p.name.toLowerCase().includes(q))return;
    const st=pstatus(p),m=mismatches(p);
    const sub=m.length===0?['Matches settings','ok']:[`${m.length} to resolve`,st];
    h+=`<div class="prow ${i===sel?'sel':''}" onclick="pick(${i})"><span class="st d-${st}"></span><div class="txt"><div class="nm">${p.name}</div><div class="sub ${sub[1]}">${sub[0]}</div></div></div>`;
  });
  document.getElementById('plist').innerHTML=h||'<div class="prow"><div class="txt"><div class="sub">No matches</div></div></div>';
}

function ar(dot,name,val,vc){return `<div class="arow"><span class="adot d-${dot}"></span><span class="an">${name}</span><span class="av ${vc||''}">${val}</span></div>`;}
function renderAudit(){
  const p=PROJECTS[sel], a=p.actual, s=p.settings, m=mismatches(p), ok=m.length===0;
  // groups
  const di=[
    ar(a.erc.errors?'err':'ok','ERC',a.erc.errors?`${a.erc.errors} errors`:'Passes',a.erc.errors?'err':''),
    ar(a.drc.violations?'err':'ok','DRC violations',a.drc.violations||'None',a.drc.violations?'err':''),
    ar(a.drc.unconnected?'err':'ok','Unconnected nets',a.drc.unconnected||'Fully routed',a.drc.unconnected?'err':''),
    ar(a.drc.parity?'err':'ok','Schematic parity',a.drc.parity?`${a.drc.parity} off`:'In sync',a.drc.parity?'err':''),
  ].join('');
  const diBad=a.erc.errors||a.drc.violations||a.drc.unconnected||a.drc.parity;
  const ruleRows=Object.keys(s.rules).map(k=>{const below=a.rules[k]<s.rules[k];return ar(below?'err':'ok',k,`${a.rules[k].toFixed(2)} / ${s.rules[k].toFixed(2)} mm`,below?'err':'');}).join('');
  const layerBad=a.layers!==s.layers;
  const fab=ruleRows+ar(a.outline?'ok':'err','Board outline',a.outline?'Present':'Missing',a.outline?'':'err')+ar(layerBad?'err':'ok','Layer count',`${a.layers} / ${s.layers}`,layerBad?'err':'');
  const fabBad=Object.keys(s.rules).some(k=>a.rules[k]<s.rules[k])||!a.outline||layerBad;
  const comp=FIELDS.filter(([k])=>s.req[k]).map(([k,lab])=>{const miss=a.comps.total-a.comps[k];return ar(miss?'err':'ok',`Has a ${lab.toLowerCase()}`,`${a.comps[k]}/${a.comps.total}`,miss?'err':'');}).join('')||ar('off','No required fields set','None','off');
  const compBad=FIELDS.some(([k])=>s.req[k]&&a.comps[k]<a.comps.total);
  const verChk=s.enforce.committed?ar(a.git.n?'err':'ok','Committed',a.git.n?`${a.git.n} uncommitted`:'Clean',a.git.n?'err':''):ar('off','Commit not required by settings','Off','off');
  return `
    <div class="verdict ${ok?'ok':pstatus(p)}"><span class="vdot"></span><div class="vt"><div class="vs">${ok?'Matches your settings':`${m.length} ${m.length===1?'thing does not':'things do not'} match`}</div><div class="vd">This project is checked against the Settings page. ${ok?'Everything conforms.':'Resolve the items below, or change the settings.'}</div></div>${ok?'':'<span class="btn primary">Fix First</span>'}</div>
    ${ok?'':`<div class="sec">Does not match <span class="ct">${m.length}</span></div>${m.map(x=>`<div class="agroup" style="padding:12px 15px;display:flex;align-items:center;gap:12px"><span class="dot d-err"></span><div style="flex:1"><div style="font-size:12.5px;font-weight:600">${x.t}</div><div style="font-size:11px;color:var(--t3);margin-top:1px">${x.g}</div></div><span class="btn sm">${x.fix}</span></div>`).join('')}`}
    <div class="sec">By setting</div>
    <div class="agroup"><div class="ah"><span class="at">Design integrity</span><span class="pill ${diBad?'err':'ok'}">${diBad?'Off':'Passes'}</span></div><div class="two">${di}</div></div>
    <div class="agroup"><div class="ah"><span class="at">Fabrication</span><span class="pill ${fabBad?'err':'ok'}">${fabBad?'Off':'Meets'}</span></div><div class="two">${fab}</div><div class="note">Design rules show the project value vs your target. Copper weight, finish and thickness are set in Settings and applied at order time.</div></div>
    <div class="agroup"><div class="ah"><span class="at">Components</span><span class="pill ${compBad?'err':'ok'}">${compBad?'Incomplete':'Complete'}</span></div>${comp}</div>
    <div class="agroup"><div class="ah"><span class="at">Version</span><span class="pill ${(s.enforce.committed&&a.git.n)?'err':'ok'}">${(s.enforce.committed&&a.git.n)?'Uncommitted':'OK'}</span></div>${verChk}</div>`;
}

function fld(label,val,unit){return `<div class="f"><div class="fl">${label}</div><div class="fi"><span>${val}</span>${unit?`<span class="u">${unit}</span>`:''}</div></div>`;}
function renderSettings(){
  const p=PROJECTS[sel], s=p.settings;
  const rules=Object.keys(s.rules).map(k=>fld(k,s.rules[k].toFixed(2),'mm')).join('');
  const req=FIELDS.map(([k,lab])=>`<div class="ck" onclick="toggleReq('${k}')"><span class="cb ${s.req[k]?'on':''}">✓</span><div><div class="clab">${lab}</div></div></div>`).join('');
  const enf=[['erc','ERC must pass','No electrical rule errors'],['drc','DRC must pass','No design rule violations'],['committed','Committed before ready','Working tree clean at release']]
    .map(([k,lab,sub])=>`<div class="ck" onclick="toggleEnf('${k}')"><span class="cb ${s.enforce[k]?'on':''}">✓</span><div><div class="clab">${lab}</div><div class="csub">${sub}</div></div></div>`).join('');
  return `
    <div class="sblock"><div class="sbt">Fabrication target</div><div class="sbd">The board spec and the design-rule floor this project must meet.</div>
      <div class="fgrid">${fld('Layer count',s.layers)}${fld('Board thickness',s.thickness,'mm')}${fld('Surface finish',s.finish)}${fld('Copper weight',s.copper)}</div>
      <div class="fgrid" style="margin-top:14px">${rules}</div>
    </div>
    <div class="sblock"><div class="sbt">Component requirements</div><div class="sbd">A component is complete only when it has every field you check here.</div>
      <div class="checks">${req}</div>
    </div>
    <div class="sblock"><div class="sbt">Order</div><div class="sbd">What you plan to build.</div>
      <div class="fgrid">${fld('Quantity',s.qty)}${fld('Spares',s.spares,'%')}</div>
    </div>
    <div class="sblock"><div class="sbt">Checks to enforce</div><div class="sbd">Which gates must pass before this project is considered ready.</div>
      <div class="checks">${enf}</div>
    </div>
    <div class="note">Changes here immediately change what the Audit page checks against. Nothing is tied to a specific vendor. You own every value.</div>`;
}

function renderDetail(){
  const p=PROJECTS[sel];
  document.getElementById('detail').innerHTML=`
    <div class="phead"><div class="hgrow"><div class="pname">${p.name}</div><div class="ppath">${p.path}</div></div>
      <div class="seg"><div class="s ${view==='audit'?'on':''}" onclick="setView('audit')">Audit</div><div class="s ${view==='settings'?'on':''}" onclick="setView('settings')">Settings</div></div>
      <span class="btn icon">⋯</span></div>
    ${view==='audit'?renderAudit():renderSettings()}`;
}
function pick(i){sel=i;renderList(document.getElementById('plist').dataset.q||'');renderDetail();}
function filterP(v){document.getElementById('plist').dataset.q=v;renderList(v);}
function setView(v){view=v;renderDetail();}
function toggleReq(k){PROJECTS[sel].settings.req[k]=!PROJECTS[sel].settings.req[k];renderList(document.getElementById('plist').dataset.q||'');renderDetail();}
function toggleEnf(k){PROJECTS[sel].settings.enforce[k]=!PROJECTS[sel].settings.enforce[k];renderList(document.getElementById('plist').dataset.q||'');renderDetail();}
renderList();renderDetail();
</script>
